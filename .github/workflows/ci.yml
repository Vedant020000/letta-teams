name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test-build:
    name: Test & Build
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  pack-smoke:
    name: Pack & Install Smoke (${{ matrix.os }})
    needs: test-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack SDK
        run: npm pack -w letta-teams-sdk

      - name: Pack CLI
        run: npm pack -w letta-teams

      - name: Test workspace package install flow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path smoke | Out-Null
          Copy-Item (Get-Item letta-teams-sdk-*.tgz).FullName smoke\
          Copy-Item (Get-Item letta-teams-*.tgz).FullName smoke\
          Push-Location smoke
          npm init -y | Out-Null
          $sdk = (Get-Item letta-teams-sdk-*.tgz).Name
          $cli = (Get-Item letta-teams-*.tgz | Where-Object { $_.Name -notlike 'letta-teams-sdk-*' }).Name
          npm install "./$sdk" "./$cli"
          npx letta-teams --help
          node -e "import('letta-teams-sdk').then(()=>console.log('sdk import ok'))"
          Pop-Location

      - name: Test workspace package install flow (Unix)
        if: runner.os != 'Windows'
        shell: sh
        run: |
          mkdir -p smoke
          cp ./letta-teams-sdk-*.tgz smoke/
          cp ./letta-teams-*.tgz smoke/
          cd smoke
          npm init -y >/dev/null 2>&1
          npm install ./letta-teams-sdk-*.tgz ./letta-teams-*.tgz
          npx letta-teams --help
          node -e "import('letta-teams-sdk').then(()=>console.log('sdk import ok'))"
